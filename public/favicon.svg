<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="neon-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="18" fill="#0A0A0F"/>

  <!-- Lat N: left vertical + diagonal + right vertical -->
  <!-- Glow layer -->
  <g filter="url(#neon-glow)" opacity="0.6">
    <!-- Left vertical bar -->
    <line x1="24" y1="18" x2="24" y2="82" stroke="#FF2D78" stroke-width="8" stroke-linecap="round"/>
    <!-- Diagonal stroke (top-left to bottom-right) -->
    <line x1="24" y1="18" x2="76" y2="82" stroke="#FF2D78" stroke-width="8" stroke-linecap="round"/>
    <!-- Right vertical bar -->
    <line x1="76" y1="18" x2="76" y2="82" stroke="#FF2D78" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Bright core -->
  <line x1="24" y1="18" x2="24" y2="82" stroke="#FF2D78" stroke-width="4" stroke-linecap="round" filter="url(#neon-glow)"/>
  <line x1="24" y1="18" x2="76" y2="82" stroke="#FF2D78" stroke-width="4" stroke-linecap="round" filter="url(#neon-glow)"/>
  <line x1="76" y1="18" x2="76" y2="82" stroke="#FF2D78" stroke-width="4" stroke-linecap="round" filter="url(#neon-glow)"/>

  <!-- Bright white highlight center -->
  <line x1="24" y1="18" x2="24" y2="82" stroke="#FFB3CC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="18" x2="76" y2="82" stroke="#FFB3CC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="18" x2="76" y2="82" stroke="#FFB3CC" stroke-width="1.5" stroke-linecap="round"/>
</svg>